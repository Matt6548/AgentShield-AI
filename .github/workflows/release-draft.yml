name: Release Draft

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Contract smoke tests
        run: python -m pytest -q tests/test_contracts_smoke.py

      - name: Prompt-pack consistency gate
        run: python -m pytest -q tests/test_prompt_files.py

      - name: Security harness regression subset
        run: |
          python -m pytest -q \
            tests/test_security_invariants.py \
            tests/test_blocked_flows_regression.py \
            tests/test_contract_failure_regression.py \
            tests/test_dry_run_no_side_effects.py \
            tests/test_release_artifacts.py

      - name: Full test suite
        run: python -m pytest -q

      - name: Compile check
        run: python -m compileall src tests

      - name: Build package artifacts
        run: |
          python -m pip install build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safecore-dist
          path: dist/*

  draft-metadata:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare draft metadata
        run: |
          mkdir -p draft
          {
            echo "# SafeCore Release Draft"
            echo ""
            echo "- ref: $GITHUB_REF"
            echo "- sha: $GITHUB_SHA"
            echo "- run_id: $GITHUB_RUN_ID"
            echo "- notes: draft artifacts only, manual gated release process"
          } > draft/RELEASE_DRAFT.md

      - name: Upload draft metadata
        uses: actions/upload-artifact@v4
        with:
          name: safecore-release-draft
          path: draft/RELEASE_DRAFT.md

