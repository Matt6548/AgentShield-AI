name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Contract smoke tests
        run: python -m pytest -q tests/test_contracts_smoke.py

      - name: Prompt-pack consistency gate
        run: python -m pytest -q tests/test_prompt_files.py

      - name: Package K docs consistency gate
        run: python -m pytest -q tests/test_docs_handoff_consistency.py

      - name: Package L RC freeze consistency gate
        run: python -m pytest -q tests/test_rc_freeze_consistency.py

      - name: Final RC decision consistency gate
        run: python -m pytest -q tests/test_final_rc_decision_consistency.py

      - name: Package F focused tests
        run: |
          python -m pytest -q \
            tests/test_model_router.py \
            tests/test_connector_adapters.py \
            tests/test_observability.py \
            tests/test_api_observability_integration.py

      - name: Package G focused tests
        run: |
          python -m pytest -q \
            tests/test_policy_authoring.py \
            tests/test_policy_linter.py \
            tests/test_approval_escalation.py \
            tests/test_api_escalation_integration.py

      - name: Package H focused tests
        run: |
          python -m pytest -q \
            tests/test_security_invariants.py \
            tests/test_blocked_flows_regression.py \
            tests/test_contract_failure_regression.py \
            tests/test_dry_run_no_side_effects.py \
            tests/test_release_artifacts.py

      - name: Package I focused tests
        run: |
          python -m pytest -q \
            tests/test_connector_sanitization.py \
            tests/test_connector_hardening.py \
            tests/test_policy_pack_v2.py \
            tests/test_policy_v1_v2_compat.py

      - name: Package J focused tests
        run: |
          python -m pytest -q \
            tests/test_model_router_profiles.py \
            tests/test_audit_integrity.py \
            tests/test_api_audit_integrity_integration.py

      - name: Compile check
        run: python -m compileall src tests

      - name: Full test suite
        run: python -m pytest -q

      - name: Build package
        run: |
          python -m pip install build
          python -m build
