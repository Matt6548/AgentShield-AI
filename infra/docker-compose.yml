name: safecore

services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    working_dir: /app
    command: >
      uvicorn src.api.app:app
      --host ${SAFECORE_API_HOST:-0.0.0.0}
      --port ${SAFECORE_API_PORT:-8000}
      --reload
    env_file:
      - ./.env.example
    environment:
      PYTHONPATH: /app
      SAFECORE_ENV: ${SAFECORE_ENV:-local}
      SAFECORE_DRY_RUN: ${SAFECORE_DRY_RUN:-true}
      SAFECORE_LOG_LEVEL: ${SAFECORE_LOG_LEVEL:-INFO}
      SAFECORE_AUDIT_FILE: ${SAFECORE_AUDIT_FILE:-/app/runtime/audit/audit.log.jsonl}
    volumes:
      - ..:/app:ro
      - safecore_runtime:/app/runtime
    ports:
      - "${SAFECORE_API_PORT:-8000}:8000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  safecore_runtime:

